<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta name="author" content="{{ site.author.name | default: site.title }}">
    <meta name="creator" content="{{ site.author.name | default: site.title }}">
    <meta name="application-name" content="{{ site.title }}">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "{{ site.author.name | default: site.title }}",
        "url": "{{ '/' | absolute_url }}",
        "sameAs": [
          "https://github.com/{{ site.author.github }}"
        ],
        "description": "{{ site.description }}"
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{ site.title }}",
        "url": "{{ '/' | absolute_url }}",
        "description": "{{ site.description }}",
        "publisher": {
          "@type": "Person",
          "name": "{{ site.author.name | default: site.title }}"
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="page-label" aria-label="Current page">
          <span>{{ page.title | default: 'Home' }}</span>
        </div>

        <div class="masthead">
          <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <nav class="site-nav" aria-label="Primary navigation">
            <a href="{{ '/projects/' | relative_url }}">Projects</a>
            <a href="{{ '/resume/' | relative_url }}">Resume</a>
            <a href="{{ '/posts/' | relative_url }}">Posts</a>
          </nav>
        </div>
      </header>

      <main class="page">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div>
          <p class="footer-name">{{ site.title }}</p>
          <p>&copy; {{ 'now' | date: '%Y' }} / Built with Jekyll</p>
        </div>
        <nav class="social-nav" aria-label="Social links">
          <a href="https://github.com/{{ site.author.github }}" rel="me">GitHub</a>
          {% if site.author.linkedin != "" %}
            <a href="{{ site.author.linkedin }}" rel="me">LinkedIn</a>
          {% endif %}
          {% if site.author.email != "" %}
            <a href="mailto:{{ site.author.email }}">Email</a>
          {% endif %}
        </nav>
      </footer>
    </div>
  </body>
</html>
